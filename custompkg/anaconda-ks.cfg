#version=DEVEL
# System authorization information
auth --enableshadow --passalgo=sha512
# Use CDROM installation media
cdrom
# Use graphical install
graphical
# Run the Setup Agent on first boot
firstboot --enable
ignoredisk --only-use=sdb,sda
# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information
network  --bootproto=dhcp --device=eno1 --onboot=off --ipv6=auto --no-activate
network  --bootproto=dhcp --device=eno2 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=eno3 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=eno4 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens2f0 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens2f1 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens3f0 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens3f1 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens4f0 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens4f1 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens5f0 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens5f1 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens6f0 --onboot=off --ipv6=auto
network  --bootproto=dhcp --device=ens6f1 --onboot=off --ipv6=auto
network  --hostname=localhost

repo --name="Server-HighAvailability" --baseurl=file:///run/install/repo/addons/HighAvailability
repo --name="Server-ResilientStorage" --baseurl=file:///run/install/repo/addons/ResilientStorage
# Root password
rootpw --iscrypted $6$4CXQfB2WWTAzEjHX$tWFyzL/aQ/3atCgIxfMoOErAyu1ITFNr/5JqIBaz7YOfOKkqNTF8pdRImSXvOioeXGOKw4j96oMNNeO2xVx4S/
# System services
services --disabled="chronyd"
# System timezone
timezone Asia/Bangkok --isUtc --nontp
# System bootloader configuration
bootloader --append=" crashkernel=auto" --location=mbr --boot-drive=sda
# Partition clearing information
clearpart --all --initlabel --drives=sda,sdb
# Disk partitioning information
part pv.925 --fstype="lvmpv" --ondisk=sda --size=5716049
part /boot --fstype="xfs" --size=1024
part pv.2535 --fstype="lvmpv" --ondisk=sdb --size=3658290
part /boot/efi --fstype="efi" --size=200 --fsoptions="umask=0077,shortname=winnt"
volgroup vg_ssd --pesize=4096 pv.2535
volgroup vg_sas --pesize=4096 pv.925
logvol /  --fstype="ext4" --size=153600 --name=lv_root --vgname=vg_sas
logvol /ssd  --fstype="xfs" --size=3658288 --name=lv_ssd --vgname=vg_ssd
logvol /home  --fstype="xfs" --size=51200 --name=lv_home --vgname=vg_sas
logvol swap  --fstype="swap" --size=4096 --name=lv_swap --vgname=vg_sas
logvol /var  --fstype="xfs" --size=4687956 --name=lv_var --vgname=vg_sas
logvol /var/log  --fstype="xfs" --size=819196 --name=lv_var_log --vgname=vg_sas

%packages
@^minimal
@core
kexec-tools

%end

%addon com_redhat_kdump --enable --reserve-mb='auto'

%end

%anaconda
pwpolicy root --minlen=6 --minquality=1 --notstrict --nochanges --notempty
pwpolicy user --minlen=6 --minquality=1 --notstrict --nochanges --emptyok
pwpolicy luks --minlen=6 --minquality=1 --notstrict --nochanges --notempty
%end
